<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Doctor Portal</h2>
            <p>Healthcare Management</p>
        </div>
        <div class="sidebar-nav">
            <a href="index.html" class="nav-item">Dashboard</a>
            <a href="#" class="nav-item">Appointments</a>
            <a href="register.html" class="nav-item active">Register New Patient</a>
            <a href="#" class="nav-item">OPD Billing</a>
            <div class="nav-item active patients-section">
                <span>Patients</span>
                <div id="patientList" class="patient-list"></div>
            </div>
            <a href="#" class="nav-item">Vitals</a>
            <a href="#" class="nav-item">Consultations</a>
            <a href="#" class="nav-item">Vaccinations</a>
            <a href="#" class="nav-item">Rx Settings</a>
            <a href="#" class="nav-item">Profile</a>
        </div>
    </aside>

    <div class="main-content">
        <div class="registration-shell">
            <div class="registration-card">
                <h1>Patient Registration</h1>

                <form id="regForm" novalidate>
                    <div class="form-row">
                        <label for="patient_id">Patient ID *</label>
                        <input type="text" id="patient_id" name="patient_id" required class="input-field" placeholder="Enter unique patient ID" autocomplete="off" spellcheck="false">
                    </div>

                    <div class="form-row">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required class="input-field" placeholder="Enter patient name">
                    </div>

                    <div class="form-row">
                        <label for="dob">DOB *</label>
                        <input type="date" id="dob" name="dob" required class="input-field">
                    </div>

                    <div class="form-row">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required class="input-field">
                            <option value="">Select gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label for="blood_type">Blood Type *</label>
                        <select id="blood_type" name="blood_type" required class="input-field">
                            <option value="">Select blood type</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label for="contact">Contact *</label>
                        <input type="text" id="contact" name="contact" required class="input-field" inputmode="numeric" placeholder="10 digit contact number">
                    </div>

                    <div class="form-row">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" class="input-field" rows="4" placeholder="Patient address"></textarea>
                    </div>

                    <button type="submit" id="submitButton" class="btn-primary registration-submit">Register Patient</button>
                </form>

                <div id="formMessage" class="form-message" aria-live="polite"></div>
            </div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="patientService.js"></script>
    <script src="patientUI.js"></script>
    <script>
        const form = document.getElementById('regForm');
        const messageBox = document.getElementById('formMessage');
        const submitButton = document.getElementById('submitButton');
        const patientIdInput = document.getElementById('patient_id');
        const formInputs = Array.from(form.querySelectorAll('input, select, textarea'));

        function showMessage(type, text) {
            messageBox.className = `form-message ${type}`;
            messageBox.textContent = text;
        }

        function clearMessage() {
            messageBox.className = 'form-message';
            messageBox.textContent = '';
        }

        function isFutureDate(value) {
            if (!value) return false;
            const chosenDate = new Date(`${value}T00:00:00`);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return chosenDate > today;
        }

        formInputs.forEach((input) => {
            input.addEventListener('input', clearMessage);
            input.addEventListener('change', clearMessage);
        });

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const patient_id = patientIdInput.value.trim();
            const name = document.getElementById('name').value.trim();
            const dob = document.getElementById('dob').value;
            const gender = document.getElementById('gender').value;
            const bloodType = document.getElementById('blood_type').value;
            const contact = document.getElementById('contact').value.trim();
            const address = document.getElementById('address').value.trim();

            if (!patient_id) {
                showMessage('error', 'Patient ID is required.');
                return;
            }

            if (/\s/.test(patient_id)) {
                showMessage('error', 'Patient ID must not contain spaces.');
                return;
            }

            const patients = getPatients();
            const exists = patients.some((patient) => patient.patient_id === patient_id);
            if (exists) {
                showMessage('error', 'Patient ID already exists. Please use another ID.');
                return;
            }

            if (!name) {
                showMessage('error', 'Name is required.');
                return;
            }

            if (!dob) {
                showMessage('error', 'DOB is required.');
                return;
            }

            if (isFutureDate(dob)) {
                showMessage('error', 'DOB cannot be in the future.');
                return;
            }

            if (!gender) {
                showMessage('error', 'Gender is required.');
                return;
            }

            if (!bloodType) {
                showMessage('error', 'Blood type is required.');
                return;
            }

            if (!/^\d{10}$/.test(contact)) {
                showMessage('error', 'Contact must be a numeric 10 digit value.');
                return;
            }

            const payload = {
                patient_id: patient_id,
                name: name,
                dob: dob,
                gender: gender,
                blood_type: bloodType,
                contact: contact,
                address: address
            };

            submitButton.disabled = true;
            submitButton.textContent = 'Registering...';
            showMessage('loading', 'Submitting patient registration...');

            try {
                const res = await fetch(`${CONFIG.REDIS_API}/api/v1/patient`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    let errorMessage = 'Failed to create patient';
                    try {
                        const err = await res.json();
                        errorMessage = err.detail || JSON.stringify(err);
                    } catch {}
                    throw new Error(errorMessage);
                }

                savePatient(payload);
                localStorage.setItem('selectedPatientId', patient_id);
                renderPatientList(patient_id);
                showMessage('success', 'Patient registered successfully. Redirecting to the dashboard...');
                form.reset();

                window.location.href = 'index.html';
            } catch (error) {
                const errorMessage = error?.message || 'Registration failed';
                showMessage('error', errorMessage === 'Failed to fetch' ? 'Network error: Failed to fetch' : errorMessage);
                submitButton.disabled = false;
                submitButton.textContent = 'Register Patient';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderPatientList();
        });
    </script>
</body>
</html>
